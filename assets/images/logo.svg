<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d26a" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer border circle with glow -->
  <circle cx="50" cy="50" r="44" fill="#070a13" stroke="url(#logoGrad)" stroke-width="3.5" />
  
  <!-- Stylized M and A overlapping -->
  <path d="M 28,68 L 28,34 L 42,54 L 50,44 L 58,54 L 72,34 L 72,68" 
        fill="none" 
        stroke="url(#logoGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Accent dot in center -->
  <circle cx="50" cy="62" r="3.5" fill="#00b4d8" filter="url(#glow)" />
</svg>
